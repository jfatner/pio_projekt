name: Cyber-Trener Automatyczne Testy

on: 
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Pobierz kod z repozytorium
      uses: actions/checkout@v4

    - name: Zainstaluj Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Zainstaluj systemowe biblioteki (Grafika i Dźwięk)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0 espeak

    - name: Zainstaluj biblioteki Pythona
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy opencv-python-headless mediapipe pyttsx3

    - name: Uruchom testy jednostkowe
      run: |
        pytest
